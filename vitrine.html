<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vitrine - Bela On Site</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f8; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 20px; color: #d81b60; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .photo-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .photo-card:hover { transform: scale(1.03); }
        .photo-card img { width: 100%; height: 300px; object-fit: cover; }
        .photo-info { padding: 10px; text-align: center; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <h1>✨ Vitrine de Trabalhos ✨</h1>
        <p>Trabalhos realizados por Aline Manicure Pro</p>
    </div>

    <div class="gallery" id="galeria">
        <!-- As fotos vão aparecer aqui -->
    </div>

    <script>
        async function carregarVitrine() {
            const res = await fetch('https://bela-onsite-api.onrender.com/profissionais/1/galeria');
            const fotos = await res.json();
            const container = document.getElementById('galeria');

            if (fotos.length === 0) {
                container.innerHTML = "<p>Nenhuma foto na vitrine ainda.</p>";
                return;
            }

            container.innerHTML = fotos.map(f => `
                <div class="photo-card">
                    <img src="${f.url_foto}" alt="Trabalho de Manicure">
                    <div class="photo-info">Realizado em: ${new Date(f.data_criacao).toLocaleDateString()}</div>
                </div>
            `).join('');
        }

        carregarVitrine();
    </script>
</body>
</html>
